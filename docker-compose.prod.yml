services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres_db
    restart: always
    env_file:
      - prod.env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      target: production
    container_name: backend_prod_app
    depends_on:
      - postgres
    env_file:
      - prod.env
    ports:
      - "3000:3000"

volumes:
  postgres_data:
